services:
  mongo:
    image: mongo:8.0 
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017" # Expose MongoDB on the default port
    environment:
      MONGO_INITDB_ROOT_USERNAME: root # Set the admin username
      MONGO_INITDB_ROOT_PASSWORD: password # Set the admin password
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro # Create users or collections
      # - mongo-data:/data/db # Persist MongoDB data
      # - mongo-config:/data/configdb # Persist MongoDB configuration

  matching-api:
    build:
      context: ./matching_service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"

  
  chat-bot:
    build:
      context: ./src
    container_name: gin-api
    ports:
      - "7004:7004" # host:container
    restart: unless-stopped
    depends_on:
      - mongo
      - matching-api

volumes:
  mongo-data:
    driver: local
  mongo-config:
    driver: local