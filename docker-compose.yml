services:
  ollama:
    build:
      context: ./ollama
      dockerfile: ../dockerfiles/ollama.dockerfile
    container_name: ollama
    env_file:
      - .env
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:11434/api/tags"]
      interval: 5s
      timeout: 5s
      retries: 10  
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  postgres:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  rag:
    build:
      context: .
      dockerfile: ./dockerfiles/rag.dockerfile
    container_name: rag
    # volumes:
    #   - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 4G

  gateway:
    build:
      context: ./gateway
      dockerfile: ../dockerfiles/gateway.dockerfile
    container_name: gateway
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      rag:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
  
  tests:
    profiles: ["test"]
    build:
      context: .
      dockerfile: dockerfiles/tests.dockerfile
    depends_on:
      gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  k6:
    image: grafana/k6:latest
    container_name: k6
    profiles: ["test"]
    volumes:
      - ./tests:/scripts
    entrypoint: [ "k6", "run", "/scripts/loadtest.js" ]
    depends_on:
      gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      tests:
        condition: service_completed_successfully

volumes:
  ollama-data:
  pgdata:
